services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lien
      POSTGRES_PASSWORD: lien
      POSTGRES_DB: lien
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lien"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://lien:lien@db:5432/lien
      API_KEYS: ${API_KEYS:-dev-key-123}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
